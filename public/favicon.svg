<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Target Background -->
  <rect width="100" height="100" rx="20" fill="#0F172A"/>
  <!-- Target Concentric Rings -->
  <circle cx="50" cy="50" r="38" stroke="#1B2A4A" stroke-width="4" fill="none"/>
  <circle cx="50" cy="50" r="28" stroke="#E31E24" stroke-width="3" stroke-dasharray="6,3" fill="none"/>
  <circle cx="50" cy="50" r="18" fill="#1B2A4A" stroke="#E31E24" stroke-width="2"/>
  <circle cx="50" cy="50" r="8" fill="#E31E24"/>
  <!-- Dart / Cutting Tool Tip Crosshairs -->
  <line x1="50" y1="5" x2="50" y2="25" stroke="#E31E24" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="75" x2="50" y2="95" stroke="#E31E24" stroke-width="3" stroke-linecap="round"/>
  <line x1="5" y1="50" x2="25" y2="50" stroke="#E31E24" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="50" x2="95" y2="50" stroke="#E31E24" stroke-width="3" stroke-linecap="round"/>
  <!-- Inner Precision Accent -->
  <circle cx="50" cy="50" r="3" fill="#FFFFFF"/>
</svg>
